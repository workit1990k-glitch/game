<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
    <style>
        /* ── Reset ── */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; display: flex; flex-direction: column; background: #1a1a2e; color: #eee; }

        /* ── Upper / Header ── */
        #upper {
            background: linear-gradient(135deg, #0f3460, #533483);
            padding: 20px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        #upper h1 { font-size: 1.8rem; letter-spacing: 1px; }
        #upper .subtitle { font-size: 0.85rem; color: #ccc; }

        /* ── Layout (sidebar + bottom) ── */
        #layout { display: flex; flex: 1; overflow: hidden; }

        /* ── Sidebar ── */
        #sidebar {
            width: 240px;
            background: #16213e;
            padding: 25px 0;
            border-right: 2px solid #0f3460;
            flex-shrink: 0;
        }
        #sidebar ul { list-style: none; }
        #sidebar li { margin: 5px 0; }
        #sidebar a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 25px;
            color: #a2a8d3;
            text-decoration: none;
            font-size: 1rem;
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
        }
        #sidebar a:hover {
            background: rgba(255,255,255,0.05);
            color: #fff;
        }
        #sidebar a.active {
            background: rgba(83, 52, 131, 0.4);
            color: #fff;
            border-left-color: #e94560;
        }
        .nav-icon { font-size: 1.3rem; width: 28px; text-align: center; }

        /* ── Bottom / Content ── */
        #bottom {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            background: #1a1a2e;
        }

        /* ── Loading animation ── */
        .loader {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 80px;
        }
        .loader::after {
            content: '';
            width: 45px; height: 45px;
            border: 4px solid #533483;
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Content fade-in ── */
        .fade-in { animation: fadeIn 0.4s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* ── Rankings table ── */
        .rankings-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .rankings-table th, .rankings-table td {
            padding: 14px 20px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .rankings-table th { background: #16213e; color: #e94560; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .rankings-table tr:hover { background: rgba(255,255,255,0.03); }
        .rank-num { font-weight: 700; color: #e94560; font-size: 1.1rem; }
        .rank-badge { display: inline-block; padding: 3px 12px; border-radius: 20px; font-size: 0.8rem; }
        .badge-gold { background: #f9d56e22; color: #f9d56e; }
        .badge-silver { background: #a8b2c922; color: #a8b2c9; }
        .badge-bronze { background: #cd7f3222; color: #cd7f32; }

        /* ── Cards (Home) ── */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .card {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 12px;
            padding: 25px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .card h3 { color: #e94560; margin-bottom: 8px; }
        .card p { color: #a2a8d3; font-size: 0.92rem; line-height: 1.6; }

        /* ── Stats row ── */
        .stats-row { display: flex; gap: 20px; margin-bottom: 25px; }
        .stat-box { background: #16213e; border: 1px solid #0f3460; border-radius: 12px; padding: 20px 30px; flex: 1; text-align: center; }
        .stat-box .number { font-size: 2.2rem; font-weight: 700; color: #e94560; }
        .stat-box .label { font-size: 0.8rem; color: #a2a8d3; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

        h2.page-title { margin-bottom: 5px; }
        .page-desc { color: #a2a8d3; margin-bottom: 20px; }
    </style>
</head>
<body>

    <!-- ══════ UPPER / HEADER ══════ -->
    <div id="upper">
        <div>
            <h1>🎮 MyWebsite</h1>
            <span class="subtitle">Player Dashboard</span>
        </div>
        <div style="color:#a2a8d3; font-size:0.9rem;">
            Welcome, <strong style="color:#fff;">PlayerOne</strong> &nbsp;👤
        </div>
    </div>

    <!-- ══════ LAYOUT (sidebar + bottom) ══════ -->
    <div id="layout">

        <!-- ── Sidebar ── -->
        <div id="sidebar">
            <ul>
                <li><a href="#" data-page="home" class="active">
                    <span class="nav-icon">🏠</span> Home
                </a></li>
                <li><a href="#" data-page="rankings">
                    <span class="nav-icon">🏆</span> Rankings
                </a></li>
                <li><a href="#" data-page="players">
                    <span class="nav-icon">👥</span> Players
                </a></li>
                <li><a href="#" data-page="settings">
                    <span class="nav-icon">⚙️</span> Settings
                </a></li>
            </ul>
        </div>

        <!-- ── Bottom / Content Area ── -->
        <div id="bottom">
            <!-- Content injected by base.js -->
        </div>
    </div>

    <!-- ══════ Load base.js ══════ -->
    <script src="base.js"></script>

</body>
</html>
